services:
  # Backend API Deployment (FastAPI)
  - type: web
    name: flashsale-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render Dashboard

  # Frontend Dashboard Deployment (React + Vite)
  - type: web
    name: flashsale-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
