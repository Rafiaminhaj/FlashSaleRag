services:
  # Backend API Deployment (FastAPI)
  - type: web
    name: flashsale-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.4

  # Frontend Dashboard Deployment (React + Vite)
  - type: web
    name: flashsale-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
