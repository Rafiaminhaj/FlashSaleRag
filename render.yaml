services:
  # Backend API Deployment (FastAPI)
  - type: web
    name: flashsale-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.4

  # Frontend Dashboard Deployment (React + Vite)
  - type: web
    name: flashsale-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
